<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Select injured body part</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; }
    .small { color:#555; font-size: 13px; margin-top: 6px; }

    /* Map layout */
    .map-wrap { position: relative; max-width: 900px; margin: 18px auto 0; }
    .map-img  { width: 100%; height: auto; display: block; }

    /* Invisible clickable regions (set alpha to 0.15 temporarily to adjust) */
    .hotspot {
      position: absolute;
      background: rgba(255, 0, 0, 0.0);
      border: 0;
      padding: 0;
      cursor: pointer;
    }
    .hotspot:focus { outline: 2px solid #000; }
  </style>
</head>
<body>
  <h2>Select injured body part</h2>
  <div class="small">Click a body region to return to the Zoho form with Body Part prefilled.</div>

  <!-- Make sure this SVG file is in the SAME folder as this index.html in GitHub -->
  <div class="map-wrap">
    <img class="map-img" src="Morris-Human-Anatomy-Diagram-1933.svg" alt="Body Map" />

    <!-- PROTOTYPE HOTSPOTS (adjust positions as needed)
         Tip: temporarily change hotspot background alpha to 0.15 in CSS to see boxes. -->

    <!-- Head / Neck -->
    <button class="hotspot" style="left:45%; top:6%;  width:10%; height:10%;"
            onclick="go('Head - Multiple Head Injury')" aria-label="Head"></button>

    <button class="hotspot" style="left:40%; top:18%; width:20%; height:9%;"
            onclick="go('Neck - Soft Tissue')" aria-label="Neck"></button>

    <!-- Trunk -->
    <button class="hotspot" style="left:35%; top:28%; width:30%; height:14%;"
            onclick="go('Trunk - Chest')" aria-label="Chest"></button>

    <button class="hotspot" style="left:35%; top:42%; width:30%; height:18%;"
            onclick="go('Trunk - Abdomen Including Groin')" aria-label="Abdomen/Groin"></button>

    <button class="hotspot" style="left:35%; top:60%; width:30%; height:10%;"
            onclick="go('Trunk - Lower Back Area')" aria-label="Lower Back"></button>

    <!-- Arms -->
    <button class="hotspot" style="left:18%; top:28%; width:16%; height:22%;"
            onclick="go('Upper Extremities - Upper Arm')" aria-label="Left Arm"></button>

    <button class="hotspot" style="left:66%; top:28%; width:16%; height:22%;"
            onclick="go('Upper Extremities - Upper Arm')" aria-label="Right Arm"></button>

    <button class="hotspot" style="left:18%; top:50%; width:16%; height:14%;"
            onclick="go('Upper Extremities - Hand')" aria-label="Left Hand"></button>

    <button class="hotspot" style="left:66%; top:50%; width:16%; height:14%;"
            onclick="go('Upper Extremities - Hand')" aria-label="Right Hand"></button>

    <!-- Legs / Knees / Feet -->
    <button class="hotspot" style="left:38%; top:70%; width:11%; height:16%;"
            onclick="go('Lower Extremities - Upper Leg')" aria-label="Left Upper Leg"></button>

    <button class="hotspot" style="left:51%; top:70%; width:11%; height:16%;"
            onclick="go('Lower Extremities - Upper Leg')" aria-label="Right Upper Leg"></button>

    <button class="hotspot" style="left:38%; top:84%; width:11%; height:7%;"
            onclick="go('Lower Extremities - Knee')" aria-label="Left Knee"></button>

    <button class="hotspot" style="left:51%; top:84%; width:11%; height:7%;"
            onclick="go('Lower Extremities - Knee')" aria-label="Right Knee"></button>

    <button class="hotspot" style="left:38%; top:91%; width:11%; height:7%;"
            onclick="go('Lower Extremities - Foot')" aria-label="Left Foot"></button>

    <button class="hotspot" style="left:51%; top:91%; width:11%; height:7%;"
            onclick="go('Lower Extremities - Foot')" aria-label="Right Foot"></button>
  </div>

  <script>
    function go(selected) {
      const params = new URLSearchParams(window.location.search);
      const returnUrl = params.get("returnUrl");
      if (!returnUrl) {
        alert("Missing returnUrl in the URL. Example: ?returnUrl=<your_zoho_form_url_encoded>");
        return;
      }
      const sep = returnUrl.includes("?") ? "&" : "?";
      window.location.href = returnUrl + sep + "body_part=" + encodeURIComponent(selected);
    }
  </script>
</body>
</html>
